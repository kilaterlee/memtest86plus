name: Build and tests

on:
  push:
    branches:
      - "*"
    paths-ignore:
      - "**/README.md"
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} ${{ matrix.compiler }} ${{ matrix.wordsize }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc]
        os: [ubuntu-20.04, ubuntu-22.04]
        wordsize: [32, 64]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        working-directory: /opt
        run: |
          sudo apt-get update
          sudo apt-get install build-essential gcc-multilib clang libc6-dev-i386-cross dosfstools mtools xorriso -y
          sudo mkdir LoongArch_Toolchains
          cd LoongArch_Toolchains
          sudo wget https://github.com/YongbaoOS/Yongbao-Toolchains/releases/download/2024.8.6/x86_64-cross-tools-loongarch64-binutils_git60d4fed4e364-gcc_14.2.0.tar.xz
          sudo tar -xf x86_64-cross-tools-loongarch64-binutils_git60d4fed4e364-gcc_14.2.0.tar.xz

      - name: Clean up
        working-directory: ./build${{matrix.wordsize}}
        run: make clean

      - name: Build
        working-directory: ./build${{matrix.wordsize}}
        run: make -j 2 CC="${{matrix.compiler}}" iso

      - name: Clean up
        working-directory: ./build64/la64
        run: make clean

      - name: Build LA64
        working-directory: ./build64/la64
        run: make -j 2 CC=/opt/LoongArch_Toolchains/cross-tools/bin/loongarch64-unknown-linux-gnu-gcc OBJCOPY=/opt/LoongArch_Toolchains/cross-tools/bin/loongarch64-unknown-linux-gnu-objcopy LD=/opt/LoongArch_Toolchains/cross-tools/bin/loongarch64-unknown-linux-gnu-ld iso
